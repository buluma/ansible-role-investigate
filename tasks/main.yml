---
# tasks file for investigate

- name: Install investigation tools
  ansible.builtin.package:
    name: "{{ investigate_packages }}"
    state: present

- name: Install curl if not already available
  ansible.builtin.package:
    name: curl
    state: present
  when: not (ansible_facts.os_family == "RedHat"
    and ansible_facts.distribution != "Fedora"
    and ansible_facts.distribution_major_version | int >= 9)
